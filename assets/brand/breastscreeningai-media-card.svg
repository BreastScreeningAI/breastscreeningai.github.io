<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">BreastScreening-AI Media Card</title>
  <desc id="desc">A public brand card for BreastScreening-AI with tagline and website.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081828"/>
      <stop offset="1" stop-color="#10233c"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="18%" r="50%">
      <stop offset="0" stop-color="#da4f91" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#da4f91" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <circle cx="1020" cy="120" r="160" fill="#5f8fd8" opacity="0.16"/>
  <circle cx="1072" cy="224" r="82" fill="#36a887" opacity="0.18"/>
  <g transform="translate(86 78)">
    <rect x="0" y="0" width="1028" height="474" rx="34" fill="#ffffff" opacity="0.05" stroke="#bfd5ff" stroke-opacity="0.18"/>
    <text x="56" y="110" fill="#bfdbff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="3">BREASTSCREENING-AI</text>
    <text x="56" y="210" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800">Human-centered multimodal AI</text>
    <text x="56" y="286" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800">for breast imaging workflows</text>
    <text x="56" y="370" fill="#d2d6dc" font-family="Arial, Helvetica, sans-serif" font-size="30">AI should strengthen, not replace, clinical judgement.</text>
    <text x="56" y="432" fill="#da4f91" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">breastscreeningai.github.io</text>
  </g>
</svg>
