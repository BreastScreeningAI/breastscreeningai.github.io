name: Sync news RSS feed

on:
  workflow_dispatch:
  schedule:
    - cron: "23 7 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update news catalogue from RSS
        run: python3 scripts/sync-news-feed.py

      - name: Commit updated catalogue
        run: |
          if git diff --quiet -- assets/data/news.json assets/data/news-candidates.json; then
            echo "No news changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/news.json assets/data/news-candidates.json
          git commit -m "Update news from RSS feed"
          git push
